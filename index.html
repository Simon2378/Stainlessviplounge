<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stainless VIP Lounge</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="translations.css">
</head>
<body class="landing-page">
    <div class="language-toggle">
        <button class="lang-btn active" data-lang="en" onclick="setLanguage('en')">English</button>
        <button class="lang-btn" data-lang="fr" onclick="setLanguage('fr')">Français</button>
    </div>
    <div class="landing-slideshow" aria-hidden="true">
        <div class="slide-layer layer-a"></div>
        <div class="slide-layer layer-b"></div>
    </div>

    <main class="landing-overlay">
        <img src="stainless.png" alt="Stainless logo" class="landing-logo">
        <h1 class="landing-title">Let&rsquo;s Eat</h1>
        <p class="landing-description">
            Stainless VIP Lounge serves quality food and drinks in a relaxed, premium atmosphere. Visit our menu and place your order quickly.
        </p>

        <a class="landing-cta" href="menu.html">View Menu</a>
        <p class="landing-call">Or call us: +237686588985</p>

        <div class="landing-socials">
            <a class="social-link facebook" href="https://www.facebook.com/share/1JgMb6Wfei/?mibextid=wwXIfr" target="_blank" rel="noopener noreferrer" aria-label="Facebook">
                <img src="Facebook.png" alt="Facebook" class="social-icon">
            </a>
            <a class="social-link tiktok" href="https://www.tiktok.com/@stainless.vip.lou?_r=1&_t=ZS-94YBnjFeEjd" target="_blank" rel="noopener noreferrer" aria-label="TikTok">
                <img src="Tiktok.png" alt="TikTok" class="social-icon">
            </a>
        </div>
    </main>

    <footer class="landing-footer">&copy; 2026 Stainless VIP Lounge.</footer>
    <script src="translations.js" defer></script>
    <script src="landing.js" defer></script>
</body>
</html>
